<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#090d16" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Rightbound Roguelite — Portrait Prototype</title>
  <link rel="stylesheet" href="styles/game.css?v=0.3.0" />
</head>
<body>
  <main id="app">
    <section id="gameZone" aria-label="Zone de jeu">
      <canvas id="game"></canvas>

      <div id="hud">
        <div class="hud-main">
          <div class="panel">
            <div class="label-line"><span>VIE</span><span id="hpText">100 / 100</span></div>
            <div class="bar"><div class="fill" id="hpFill"></div></div>
          </div>

          <div class="panel">
            <div class="label-line"><span>XP — NIV. <span id="levelText">1</span></span><span id="xpText">0 / 30</span></div>
            <div class="bar"><div class="fill" id="xpFill"></div></div>
          </div>
        </div>

        <div class="hud-mini">
          <div class="panel stat" id="damageText">⚔ 12</div>
          <div class="panel stat" id="armorText">🛡 0</div>
          <div class="panel stat" id="coinsText">◉ 0</div>
          <div class="panel stat" id="distanceText">0 %</div>
        </div>

        <div class="panel" id="bossHud">
          <div class="label-line"><span>GARDIEN DU SECTEUR</span><span id="bossText">0 / 0</span></div>
          <div class="bar"><div class="fill" id="bossFill"></div></div>
        </div>
      </div>
    </section>

    <section id="controls" aria-label="Contrôles">
      <div>
        <div class="section-label">Inventaire rapide</div>
        <div class="inventory-row">
          <button class="slot" id="potionButton" aria-label="Utiliser une potion">
            <span class="slot-count" id="potionCount">2</span>
            <span class="slot-icon">🧪</span>
            <span class="slot-name">Potion</span>
          </button>
          <button class="slot empty" disabled><span class="slot-icon">＋</span><span class="slot-name">Libre</span></button>
          <button class="slot empty" disabled><span class="slot-icon">＋</span><span class="slot-name">Libre</span></button>
          <button class="slot empty" disabled><span class="slot-icon">🔒</span><span class="slot-name">Verrou</span></button>
          <button class="slot empty" disabled><span class="slot-icon">🔒</span><span class="slot-name">Verrou</span></button>
        </div>
      </div>

      <div class="actions">
        <button class="action-button jump-button" id="jumpButton" aria-label="Sauter">
          <span class="action-icon">⬆️</span>
          <span class="action-name">SAUT</span>
          <span class="action-subtitle">Esquive brève</span>
          <span class="cooldown" id="jumpCooldown">0</span>
        </button>

        <div class="spell-grid">
          <button class="action-button spell-button" id="spell1Button" aria-label="Frappe lourde">
            <span class="action-icon">🔥</span>
            <span class="action-name">Frappe</span>
            <span class="action-subtitle">Gros dégâts</span>
            <span class="cooldown" id="spell1Cooldown">0</span>
          </button>

          <button class="action-button spell-button" id="spell2Button" aria-label="Soin d'urgence">
            <span class="action-icon">💚</span>
            <span class="action-name">Soin</span>
            <span class="action-subtitle">Récupère PV</span>
            <span class="cooldown" id="spell2Cooldown">0</span>
          </button>

          <button class="action-button spell-button" id="spell3Button" aria-label="Onde paralysante">
            <span class="action-icon">⚡</span>
            <span class="action-name">Onde</span>
            <span class="action-subtitle">Étourdit</span>
            <span class="cooldown" id="spell3Cooldown">0</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="overlay">
    <div class="modal" id="modalContent"></div>
  </div>
  <script defer src="src/game.js?v=0.2.1"></script>
  <script defer src="src/meta-menu.js?v=0.3.0"></script>
</body>
</html>
