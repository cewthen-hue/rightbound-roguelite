name: Runtime checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check core JavaScript syntax
        run: |
          node --check src/game.js
          node --check src/combat-runtime.js
          node --check src/meta-menu.js
          node --check src/menu-layout.js
          node --check src/chests.js
          node --check src/inventory.js
