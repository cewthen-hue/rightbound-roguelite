name: Runtime checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check core JavaScript syntax
        run: |
          node --check src/game.js
          node --check src/combat-runtime.js
          node --check src/meta-menu.js
          node --check src/menu-layout.js
          node --check src/menu-v2.js
          node --check src/menu-v2-topbar.js
          node --check src/menu-v2-world-header.js
          node --check src/menu-v3/menu-v3-shell.js
          node --check src/menu-v3/menu-v3-components.js
          node --check src/menu-v3/menu-v3-data.js
          node --check src/menu-v3/menu-v3-interactions.js
          node --check src/menu-v3/menu-v3-sync.js
          node --check src/menu-v3/menu-v3-geometry.js
          node --check src/app-shell.js
          node --check src/chests.js
          node --check src/inventory.js

      - name: Run combat runtime smoke test
        run: node tests/game-runtime-smoke.mjs

      - name: Validate Menu V3 structural contract
        run: node tests/menu-v3-contract.mjs

      - name: Validate Menu V3 components
        run: node tests/menu-v3-components-contract.mjs

      - name: Validate Menu V3 synchronized data
        run: node tests/menu-v3-data-contract.mjs

      - name: Validate Menu V3 synchronized interactions
        run: node tests/menu-v3-interactions-contract.mjs

      - name: Validate Menu V3 synchronization coordinator
        run: node tests/menu-v3-sync-contract.mjs

      - name: Validate Menu V3 Lot 4 geometry lock
        run: node tests/menu-v3-geometry-contract.mjs

      - name: Validate iPhone and Android portrait target
        run: node tests/mobile-platform-contract.mjs
